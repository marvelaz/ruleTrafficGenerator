# ============================================================
# FortiGate Lab Configuration File
# All sensitive values should be replaced before use
# ============================================================

fortigate:
  host: "192.168.1.1"           # FortiGate management IP
  port: 443
  api_token: "YOUR_FGT_API_TOKEN_HERE"
  vdom: "root"                   # Target VDOM for rule generation
  verify_ssl: false              # Set true in production with valid cert
  timeout: 30

fortianalyzer:
  host: "10.10.0.200"            # FortiAnalyzer IP
  port: 443
  api_token: "YOUR_FAZ_API_TOKEN_HERE"
  verify_ssl: false
  timeout: 30
  adom: "root"                   # FortiAnalyzer ADOM

ai:
  openai_api_key: "YOUR_OPENAI_API_KEY_HERE"
  openai_model: "gpt-4o"
  anthropic_api_key: "YOUR_ANTHROPIC_API_KEY_HERE"
  anthropic_model: "claude-sonnet-4-20250514"
  max_tokens: 4096

network:
  inside:
    interface: "port1"           # FortiGate inside interface name
    primary_ip: "192.168.1.100"
    subnet: "192.168.1.0/24"
    aliases:                     # Secondary IPs to add on linux1
      - "192.168.1.101"
      - "192.168.1.102"
      - "192.168.1.103"
      - "192.168.1.104"
      - "192.168.1.105"
      - "192.168.1.110"
      - "192.168.1.120"
      - "192.168.1.130"
    linux_interface: "eth0"      # linux1 interface name

  outside:
    interface: "port2"           # FortiGate outside interface name
    primary_ip: "10.10.0.100"
    subnet: "10.10.0.0/24"
    aliases:                     # Secondary IPs to add on linux2
      - "10.10.0.101"
      - "10.10.0.102"
      - "10.10.0.103"
      - "10.10.0.104"
      - "10.10.0.105"
      - "10.10.0.110"
      - "10.10.0.120"
      - "10.10.0.130"
    linux_interface: "eth0"      # linux2 interface name

traffic:
  inter_packet_delay: 0.5        # seconds between packets (keep logs readable)
  inter_session_delay: 1.0       # seconds between sessions
  match_ratio: 0.68              # target 60-75% rule match (0.68 = 68%)
  http_target_port: 80
  https_target_port: 443
  dns_target_port: 53
  icmp_count: 3                  # ICMP packets per session
  tcp_syn_only: true             # True = SYN only (no full handshake needed)
  http_paths:
    - "/"
    - "/index.html"
    - "/api/status"
    - "/health"
    - "/favicon.ico"

lab:
  tag: "LAB-TEST-2025"           # Tag embedded in all rule comments
  observation_window_hours: 24   # Used in analysis phase
  output_dir: "./lab_output"     # Local directory for reports
  rules_backup_file: "generated_rules.json"
  analysis_report_file: "analysis_report.json"

logging:
  level: "INFO"                  # DEBUG, INFO, WARNING, ERROR
  log_file: "lab.log"
